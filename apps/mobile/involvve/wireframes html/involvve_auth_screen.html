<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-sans); }
.wrap { padding: 1rem 0; display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
.phone { width: 280px; height: 580px; background: #0A1A12; border-radius: 40px; border: 0.5px solid #1B4332; overflow: hidden; display: flex; flex-direction: column; position: relative; }
.statusbar { padding: 12px 20px 6px; display: flex; justify-content: space-between; font-size: 10px; color: #52B788; font-weight: 500; }
.screen { flex: 1; display: flex; flex-direction: column; padding: 0 24px 32px; }
.logo-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
.logo { width: 64px; height: 64px; background: #1B4332; border-radius: 20px; display: flex; align-items: center; justify-content: center; }
.logo-inner { width: 36px; height: 36px; background: #2D6A4F; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
.logo-dot { width: 14px; height: 14px; background: #52B788; border-radius: 50%; }
.app-name { font-size: 28px; font-weight: 500; color: #F0FAF3; letter-spacing: -0.5px; }
.tagline { font-size: 13px; color: #52B788; text-align: center; line-height: 1.5; max-width: 180px; }
.bottom { display: flex; flex-direction: column; gap: 10px; }
.divider { display: flex; align-items: center; gap: 10px; margin: 4px 0; }
.divider-line { flex: 1; height: 0.5px; background: #1B4332; }
.divider-text { font-size: 11px; color: #3D5A47; }
.btn { width: 100%; padding: 13px; border-radius: 14px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; gap: 10px; }
.btn-apple { background: #F0FAF3; color: #0A1A12; }
.btn-google { background: #122318; color: #B7E4C7; border: 0.5px solid #1B4332; }
.btn-icon { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
.apple-icon { background: #0A1A12; color: #F0FAF3; }
.google-icon { background: #2D6A4F; color: #D8F3DC; }
.terms { font-size: 10px; color: #3D5A47; text-align: center; line-height: 1.5; margin-top: 4px; }
.terms span { color: #52B788; }
.bg-glow { position: absolute; width: 200px; height: 200px; background: radial-gradient(circle, rgba(45,106,79,0.15) 0%, transparent 70%); top: 80px; left: 50%; transform: translateX(-50%); pointer-events: none; }
</style>
<div class="wrap">
  <div class="phone">
    <div class="bg-glow"></div>
    <div class="statusbar">
      <span>9:41</span>
      <span>●●● WiFi ■</span>
    </div>
    <div class="screen">
      <div class="logo-area">
        <div class="logo">
          <div class="logo-inner">
            <div class="logo-dot"></div>
          </div>
        </div>
        <div class="app-name">involvve</div>
        <div class="tagline">Don't go alone. Find your people before you show up.</div>
      </div>
      <div class="bottom">
        <button class="btn btn-apple">
          <div class="btn-icon apple-icon">
            <i class="ti ti-brand-apple" style="font-size:13px;" aria-hidden="true"></i>
          </div>
          Continue with Apple
        </button>
        <button class="btn btn-google">
          <div class="btn-icon google-icon">G</div>
          Continue with Google
        </button>
        <div class="divider">
          <div class="divider-line"></div>
          <span class="divider-text">by continuing you agree to our</span>
          <div class="divider-line"></div>
        </div>
        <div class="terms"><span>Terms of Service</span> and <span>Privacy Policy</span></div>
      </div>
    </div>
  </div>

  <div style="display:flex; gap:8px; width:280px;">
    <button style="flex:1; padding:10px; border-radius:10px; font-size:12px; font-weight:500; background:#122318; color:#52B788; border:0.5px solid #1B4332; cursor:pointer;" onclick="sendPrompt('The auth screen looks good, lets tweak it.')">Tweak it</button>
    <button style="flex:1; padding:10px; border-radius:10px; font-size:12px; font-weight:500; background:#2D6A4F; color:#D8F3DC; border:none; cursor:pointer;" onclick="sendPrompt('Auth screen approved. Lets build the onboarding screen next.')">Approve — next screen</button>
  </div>
</div>
